<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shofwan Sasri Azhari — Digital Business & Agritech Innovator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  darkMode: 'class',
  theme: {
    extend: {
      fontFamily: {
        display: ['Syne', 'sans-serif'],
        body: ['DM Sans', 'sans-serif'],
        mono: ['Space Mono', 'monospace'],
      },
      colors: {
        navy: { 900: '#050d1f', 800: '#0a1628', 700: '#0d1f3c', 600: '#112952' },
        teal: { 400: '#2dd4bf', 500: '#14b8a6', 600: '#0d9488' },
        cyan: { 400: '#22d3ee', 500: '#06b6d4' },
        cream: '#f8f5ee',
      }
    }
  }
}
</script>
<style>
  :root {
    --navy: #050d1f;
    --navy2: #0a1628;
    --teal: #14b8a6;
    --cyan: #22d3ee;
    --white: #f8f5ee;
    --text-muted: #94a3b8;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--navy);
    color: var(--white);
    overflow-x: hidden;
    cursor: none;
  }
  body.light {
    background: #f0f4f8;
    color: #0a1628;
  }

  /* CUSTOM CURSOR */
  .cursor {
    width: 12px; height: 12px;
    background: var(--teal);
    border-radius: 50%;
    position: fixed; top: 0; left: 0;
    pointer-events: none; z-index: 9999;
    transition: transform 0.1s ease;
  }
  .cursor-follower {
    width: 36px; height: 36px;
    border: 1.5px solid rgba(20,184,166,0.4);
    border-radius: 50%;
    position: fixed; top: 0; left: 0;
    pointer-events: none; z-index: 9998;
    transition: transform 0.25s ease, opacity 0.3s;
  }

  /* CANVAS */
  #particles-canvas {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
  }

  /* NAVBAR */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
    padding: 1.25rem 2rem;
    display: flex; align-items: center; justify-content: space-between;
    transition: all 0.4s ease;
  }
  nav.scrolled {
    background: rgba(5,13,31,0.85);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-bottom: 1px solid rgba(20,184,166,0.15);
    padding: 0.85rem 2rem;
  }
  body.light nav.scrolled {
    background: rgba(240,244,248,0.88);
    border-bottom: 1px solid rgba(20,184,166,0.2);
  }
  .nav-logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.35rem;
    letter-spacing: -0.03em;
    background: linear-gradient(135deg, var(--teal), var(--cyan));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .nav-links a {
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-muted);
    text-decoration: none;
    margin-left: 2rem;
    transition: color 0.3s;
    position: relative;
  }
  .nav-links a::after {
    content: '';
    position: absolute; bottom: -3px; left: 0; right: 0;
    height: 1px; background: var(--teal);
    transform: scaleX(0); transition: transform 0.3s;
  }
  .nav-links a:hover { color: var(--teal); }
  .nav-links a:hover::after { transform: scaleX(1); }

  /* DARK MODE TOGGLE */
  .dm-toggle {
    width: 46px; height: 24px;
    background: rgba(20,184,166,0.15);
    border: 1px solid rgba(20,184,166,0.3);
    border-radius: 999px;
    cursor: pointer;
    position: relative; margin-left: 2rem;
    transition: background 0.3s;
  }
  .dm-toggle::after {
    content: '🌙';
    font-size: 12px;
    position: absolute; top: 50%; left: 4px;
    transform: translateY(-50%);
    transition: left 0.3s;
  }
  body.light .dm-toggle::after {
    content: '☀️';
    left: calc(100% - 22px);
  }

  /* HERO */
  #hero {
    min-height: 100vh;
    display: flex; align-items: center;
    position: relative; overflow: hidden;
    padding-top: 5rem;
  }
  .hero-content { position: relative; z-index: 2; }
  .hero-badge {
    display: inline-flex; align-items: center; gap: 0.5rem;
    background: rgba(20,184,166,0.1);
    border: 1px solid rgba(20,184,166,0.3);
    border-radius: 999px;
    padding: 0.35rem 1rem;
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.08em;
    color: var(--teal);
    margin-bottom: 1.5rem;
  }
  .hero-badge::before {
    content: '';
    width: 6px; height: 6px;
    background: var(--teal);
    border-radius: 50%;
    animation: pulse-dot 2s infinite;
  }
  @keyframes pulse-dot {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.7); }
  }
  .hero-name {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: clamp(2.8rem, 7vw, 6rem);
    line-height: 1.0;
    letter-spacing: -0.04em;
    margin-bottom: 1rem;
  }
  .hero-name .accent { background: linear-gradient(135deg, var(--teal), var(--cyan)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .typing-wrapper {
    font-family: 'Space Mono', monospace;
    font-size: clamp(0.85rem, 2vw, 1.1rem);
    color: var(--cyan);
    margin-bottom: 1.5rem;
    min-height: 1.6em;
  }
  .typing-cursor { animation: blink 0.8s step-end infinite; }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
  .hero-desc {
    font-size: 1rem;
    color: #94a3b8;
    max-width: 500px;
    line-height: 1.75;
    margin-bottom: 2.5rem;
  }
  body.light .hero-desc { color: #475569; }

  /* BUTTONS */
  .btn-primary {
    display: inline-flex; align-items: center; gap: 0.5rem;
    padding: 0.85rem 2rem;
    background: linear-gradient(135deg, var(--teal), var(--cyan));
    color: var(--navy);
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.9rem;
    border-radius: 8px;
    text-decoration: none;
    transition: all 0.3s ease;
    box-shadow: 0 0 30px rgba(20,184,166,0.3);
  }
  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 0 50px rgba(20,184,166,0.5);
  }
  .btn-outline {
    display: inline-flex; align-items: center; gap: 0.5rem;
    padding: 0.85rem 2rem;
    border: 1.5px solid rgba(20,184,166,0.5);
    color: var(--teal);
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.9rem;
    border-radius: 8px;
    text-decoration: none;
    transition: all 0.3s ease;
    background: transparent;
  }
  .btn-outline:hover {
    background: rgba(20,184,166,0.1);
    border-color: var(--teal);
    transform: translateY(-2px);
  }

  /* PROFILE VISUAL */
  .hero-visual {
    position: relative; z-index: 2;
    display: flex; align-items: center; justify-content: center;
  }
  .avatar-ring {
    width: 300px; height: 300px;
    border-radius: 50%;
    background: conic-gradient(var(--teal), var(--cyan), transparent, var(--teal));
    padding: 3px;
    animation: spin-slow 8s linear infinite;
    position: relative;
  }
  @keyframes spin-slow { to { transform: rotate(360deg); } }
  .avatar-inner {
    width: 100%; height: 100%;
    border-radius: 50%;
    background: linear-gradient(135deg, #0a1f3f, #0d2d50);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 4rem;
    background: var(--navy2);
    overflow: hidden;
  }
  .avatar-initials {
    background: linear-gradient(135deg, var(--teal), var(--cyan));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    font-size: 4.5rem;
    font-weight: 800;
    font-family: 'Syne', sans-serif;
  }
  .floating-tag {
    position: absolute;
    background: rgba(5,13,31,0.9);
    border: 1px solid rgba(20,184,166,0.3);
    border-radius: 10px;
    padding: 0.5rem 0.9rem;
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    color: var(--teal);
    backdrop-filter: blur(12px);
    white-space: nowrap;
  }
  .ft1 { top: 10%; right: -20%; animation: float1 4s ease-in-out infinite; }
  .ft2 { bottom: 20%; left: -25%; animation: float2 5s ease-in-out infinite; }
  .ft3 { top: 55%; right: -28%; animation: float1 6s ease-in-out infinite 1s; }
  @keyframes float1 { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
  @keyframes float2 { 0%,100%{transform:translateY(0)} 50%{transform:translateY(8px)} }

  /* SECTION STYLES */
  section { padding: 6rem 0; }
  .section-label {
    font-family: 'Space Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--teal);
    margin-bottom: 0.75rem;
    display: flex; align-items: center; gap: 0.75rem;
  }
  .section-label::after {
    content: '';
    flex: 1; height: 1px;
    background: linear-gradient(90deg, rgba(20,184,166,0.3), transparent);
    max-width: 120px;
  }
  .section-title {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: clamp(2rem, 4vw, 3rem);
    line-height: 1.1;
    letter-spacing: -0.03em;
    margin-bottom: 1rem;
  }

  /* ABOUT */
  .about-text { color: #94a3b8; line-height: 1.85; font-size: 1rem; }
  body.light .about-text { color: #475569; }
  .stat-card {
    background: rgba(20,184,166,0.06);
    border: 1px solid rgba(20,184,166,0.15);
    border-radius: 12px;
    padding: 1.5rem;
    text-align: center;
    transition: all 0.3s;
  }
  body.light .stat-card { background: rgba(20,184,166,0.05); border-color: rgba(20,184,166,0.2); }
  .stat-card:hover { border-color: var(--teal); transform: translateY(-4px); }
  .stat-num {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 2.2rem;
    background: linear-gradient(135deg, var(--teal), var(--cyan));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .stat-label { font-size: 0.78rem; color: var(--text-muted); margin-top: 0.25rem; }

  /* PROJECTS */
  .project-card {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px;
    padding: 1.75rem;
    backdrop-filter: blur(12px);
    transition: all 0.4s ease;
    position: relative; overflow: hidden;
    cursor: pointer;
  }
  body.light .project-card {
    background: rgba(255,255,255,0.7);
    border-color: rgba(0,0,0,0.08);
    box-shadow: 0 4px 24px rgba(0,0,0,0.06);
  }
  .project-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--teal), var(--cyan));
    transform: scaleX(0); transform-origin: left;
    transition: transform 0.4s;
  }
  .project-card:hover { border-color: rgba(20,184,166,0.3); transform: translateY(-6px); }
  .project-card:hover::before { transform: scaleX(1); }
  .project-card:hover { box-shadow: 0 20px 60px rgba(20,184,166,0.1); }
  .project-icon {
    width: 52px; height: 52px;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.5rem;
    margin-bottom: 1.25rem;
  }
  .project-name {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 1.2rem;
    margin-bottom: 0.5rem;
    color: #e2e8f0;
  }
  body.light .project-name { color: #0a1628; }
  .project-desc { font-size: 0.875rem; color: #64748b; line-height: 1.7; margin-bottom: 1.25rem; }
  body.light .project-desc { color: #475569; }
  .project-tag {
    display: inline-block;
    padding: 0.2rem 0.65rem;
    border-radius: 999px;
    font-size: 0.65rem;
    font-family: 'Space Mono', monospace;
    background: rgba(20,184,166,0.1);
    color: var(--teal);
    border: 1px solid rgba(20,184,166,0.2);
    margin: 0.2rem;
  }

  /* TIMELINE */
  .timeline { position: relative; padding-left: 2rem; }
  .timeline::before {
    content: '';
    position: absolute; left: 0; top: 0; bottom: 0;
    width: 1px;
    background: linear-gradient(to bottom, var(--teal), transparent);
  }
  .timeline-item {
    position: relative; padding-bottom: 3rem;
    opacity: 0; transform: translateX(-20px);
    transition: all 0.6s ease;
  }
  .timeline-item.visible { opacity: 1; transform: translateX(0); }
  .timeline-dot {
    position: absolute; left: -2.45rem;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--teal);
    border: 3px solid var(--navy);
    box-shadow: 0 0 12px rgba(20,184,166,0.5);
    top: 4px;
  }
  body.light .timeline-dot { border-color: #f0f4f8; }
  .timeline-date {
    font-family: 'Space Mono', monospace;
    font-size: 0.68rem;
    color: var(--teal);
    margin-bottom: 0.4rem;
    letter-spacing: 0.06em;
  }
  .timeline-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 1.1rem;
    margin-bottom: 0.3rem;
  }
  .timeline-role {
    font-size: 0.8rem;
    color: var(--cyan);
    margin-bottom: 0.6rem;
    font-style: italic;
  }
  .timeline-desc { font-size: 0.875rem; color: #64748b; line-height: 1.7; }
  body.light .timeline-desc { color: #475569; }

  /* SKILLS */
  .skill-badge {
    display: inline-flex; align-items: center; gap: 0.5rem;
    padding: 0.5rem 1rem;
    border-radius: 8px;
    border: 1px solid rgba(20,184,166,0.2);
    background: rgba(20,184,166,0.05);
    font-size: 0.8rem;
    font-family: 'Space Mono', monospace;
    color: #94a3b8;
    margin: 0.3rem;
    transition: all 0.3s;
    cursor: default;
  }
  body.light .skill-badge { color: #475569; background: rgba(20,184,166,0.07); }
  .skill-badge:hover {
    border-color: var(--teal);
    color: var(--teal);
    background: rgba(20,184,166,0.1);
    transform: translateY(-2px);
  }
  .skill-group-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.9rem;
    letter-spacing: 0.03em;
    margin-bottom: 1rem;
    color: var(--white);
    display: flex; align-items: center; gap: 0.6rem;
  }
  body.light .skill-group-title { color: #0a1628; }
  .skill-group-title::before {
    content: '';
    width: 4px; height: 16px;
    background: linear-gradient(180deg, var(--teal), var(--cyan));
    border-radius: 2px;
  }
  .progress-bar {
    height: 4px;
    background: rgba(20,184,166,0.1);
    border-radius: 999px;
    overflow: hidden;
    margin-top: 0.5rem;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--teal), var(--cyan));
    border-radius: 999px;
    width: 0;
    transition: width 1.2s cubic-bezier(.25,.46,.45,.94);
  }
  .skill-item { margin-bottom: 1rem; }
  .skill-label {
    display: flex; justify-content: space-between;
    font-size: 0.8rem;
    color: #94a3b8;
    margin-bottom: 0.3rem;
  }
  body.light .skill-label { color: #475569; }

  /* CONTACT */
  .contact-form input,
  .contact-form textarea {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    padding: 0.85rem 1.1rem;
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.3s, box-shadow 0.3s;
    margin-bottom: 1rem;
  }
  body.light .contact-form input,
  body.light .contact-form textarea {
    background: rgba(255,255,255,0.8);
    border-color: rgba(0,0,0,0.1);
    color: #0a1628;
  }
  .contact-form input:focus,
  .contact-form textarea:focus {
    border-color: var(--teal);
    box-shadow: 0 0 0 3px rgba(20,184,166,0.1);
  }
  .contact-form input::placeholder,
  .contact-form textarea::placeholder { color: #475569; }

  /* GLOW BG */
  .glow-orb {
    position: absolute; border-radius: 50%;
    filter: blur(80px); opacity: 0.12; pointer-events: none;
  }

  /* SCROLL REVEAL */
  .reveal {
    opacity: 0; transform: translateY(30px);
    transition: opacity 0.7s ease, transform 0.7s ease;
  }
  .reveal.visible { opacity: 1; transform: translateY(0); }
  .reveal-delay-1 { transition-delay: 0.1s; }
  .reveal-delay-2 { transition-delay: 0.2s; }
  .reveal-delay-3 { transition-delay: 0.3s; }
  .reveal-delay-4 { transition-delay: 0.4s; }

  /* FOOTER */
  footer {
    border-top: 1px solid rgba(255,255,255,0.06);
    padding: 2rem 0;
    text-align: center;
    font-size: 0.8rem;
    color: #334155;
    font-family: 'Space Mono', monospace;
  }
  body.light footer { border-color: rgba(0,0,0,0.08); color: #94a3b8; }

  /* LINKEDIN ICON */
  .li-link {
    display: inline-flex; align-items: center; gap: 0.5rem;
    color: var(--teal);
    text-decoration: none;
    font-family: 'Space Mono', monospace;
    font-size: 0.8rem;
    padding: 0.6rem 1.2rem;
    border: 1px solid rgba(20,184,166,0.3);
    border-radius: 8px;
    transition: all 0.3s;
  }
  .li-link:hover {
    background: rgba(20,184,166,0.1);
    transform: translateY(-2px);
    box-shadow: 0 0 20px rgba(20,184,166,0.2);
  }
  .li-icon { font-size: 1.2rem; animation: bounce-li 2s ease-in-out infinite; }
  @keyframes bounce-li { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }

  /* SECTION BG ALT */
  .section-alt { background: rgba(255,255,255,0.015); }
  body.light .section-alt { background: rgba(0,0,0,0.025); }

  /* MOBILE NAV */
  .hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; }
  .hamburger span { display: block; width: 24px; height: 2px; background: var(--teal); border-radius: 2px; transition: all 0.3s; }
  .mobile-nav {
    display: none;
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(5,13,31,0.97);
    z-index: 999;
    flex-direction: column;
    align-items: center; justify-content: center;
    gap: 2rem;
  }
  body.light .mobile-nav { background: rgba(240,244,248,0.97); }
  .mobile-nav.open { display: flex; }
  .mobile-nav a {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 1.5rem;
    color: var(--white);
    text-decoration: none;
    transition: color 0.3s;
  }
  body.light .mobile-nav a { color: #0a1628; }
  .mobile-nav a:hover { color: var(--teal); }

  @media (max-width: 768px) {
    .nav-links { display: none; }
    .hamburger { display: flex; }
    .ft1, .ft2, .ft3 { display: none; }
    .avatar-ring { width: 200px; height: 200px; }
    .avatar-initials { font-size: 3rem; }
  }

  /* TOAST */
  .toast {
    position: fixed; bottom: 2rem; right: 2rem;
    background: rgba(20,184,166,0.15);
    border: 1px solid rgba(20,184,166,0.4);
    backdrop-filter: blur(12px);
    color: var(--teal);
    padding: 1rem 1.5rem;
    border-radius: 12px;
    font-family: 'Space Mono', monospace;
    font-size: 0.78rem;
    z-index: 9999;
    transform: translateY(100px);
    opacity: 0;
    transition: all 0.4s cubic-bezier(.34,1.56,.64,1);
  }
  .toast.show { transform: translateY(0); opacity: 1; }

  /* light mode body text */
  body.light { color: #0a1628; }
  body.light .section-title { color: #0a1628; }
  body.light .timeline-title { color: #0a1628; }
</style>
</head>
<body>
<!-- Custom Cursor -->
<div class="cursor" id="cursor"></div>
<div class="cursor-follower" id="cursor-follower"></div>

<!-- Toast -->
<div class="toast" id="toast">✓ Pesan terkirim! Akan segera dihubungi.</div>

<!-- Mobile Nav -->
<div class="mobile-nav" id="mobileNav">
  <a href="#hero" onclick="closeMobileNav()">Beranda</a>
  <a href="#about" onclick="closeMobileNav()">Tentang</a>
